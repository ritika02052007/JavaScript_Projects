<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bg Changer</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <h1 id="heading-1">Background Changer</h1>
    <div class="canvas">
      <h1>Color Schema Switcher</h1>

      <span class="button" id="sienna"></span>
      <span class="button" id="coral"></span>
      <span class="button" id="orange"></span>
      <span class="button" id="olive"></span>
      <span class="button" id="red"></span>
      <span class="button" id="magenta"></span>

      <h2>
        Try Clicking on one of the colors above
        <span>to change the background color of this page</span>
      </h2>
    </div>

    <script src="main.js"></script>
  </body>
</html>
